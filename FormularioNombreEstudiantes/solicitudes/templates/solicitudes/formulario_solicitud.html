<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Solicitud</title>

    <!-- Fuente + estilos básicos -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        form p {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        input, select, textarea {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-top: 5px;
            font-size: 14px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #4f46e5;
        }

        .errorlist {
            color: red;
            font-size: 13px;
            margin: 5px 0;
            list-style: none;
            padding: 0;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            background: #4f46e5;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            background: #4338ca;
        }

        .form-errors {
            background: #ffe5e5;
            color: #b00020;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Formulario de Solicitud</h1>

        <!-- 🔴 Error general -->
        {% if form.errors %}
            <div class="form-errors">
                Por favor corrige los errores antes de enviar el formulario.
            </div>
        {% endif %}

        <form method="post" enctype="multipart/form-data" novalidate>
            {% csrf_token %}

            <!-- 🔽 Render manual para mejor control -->
            {% for field in form %}
                <p>
                    <label>{{ field.label }}</label>
                    {{ field }}

                    <!-- errores por campo -->
                    {% if field.errors %}
                        <ul class="errorlist">
                            {% for error in field.errors %}
                                <li>{{ error }}</li>
                            {% endfor %}
                        </ul>
                    {% endif %}
                </p>
            {% endfor %}

            <button type="submit" class="btn">Enviar solicitud</button>
        </form>
    </div>
</body>
</html>
